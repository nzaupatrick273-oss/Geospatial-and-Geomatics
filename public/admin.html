<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geomatic GIS Admin Dashboard</title>

<style>
/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f2f4f8;
  color: #333;
}

/* ================= HEADER ================= */
header {
  background: linear-gradient(135deg, #007BFF, #0056b3);
  color: white;
  padding: 25px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* ================= LAYOUT ================= */
.container {
  display: flex;
  min-height: 100vh;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width: 220px;
  background: white;
  box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  padding-top: 20px;
}

.sidebar a {
  display: block;
  padding: 15px;
  text-decoration: none;
  color: #333;
  border-left: 4px solid transparent;
  transition: 0.3s;
}

.sidebar a:hover {
  background: #f0f6ff;
  border-left: 4px solid #007BFF;
}

/* logout */
.logout {
  color: white !important;
  background: #dc3545;
  margin: 20px;
  text-align: center;
  border-radius: 8px;
}

/* ================= MAIN ================= */
.main {
  flex: 1;
  padding: 30px;
}

/* ================= CARDS ================= */
.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
}

/* ================= FORM ================= */
select, input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  background: #007BFF;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #0056b3;
}

/* ================= FILE LIST ================= */
ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 12px;
  margin-bottom: 10px;
  background: #f9fafc;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

li a {
  text-decoration: none;
  color: #007BFF;
}

.delete {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  GEOMATIC ENGINEERING & GEOSPATIAL INFORMATION SYSTEMS
</header>

<div class="container">

  <!-- ================= SIDEBAR ================= -->
  <div class="sidebar">
    <a href="#">📊 Dashboard</a>
    <a href="#">📂 Files</a>
    <a href="#">⚙ Settings</a>
    <a href="/logout" class="logout">🚪 Logout</a>
  </div>

  <!-- ================= MAIN ================= -->
  <div class="main">

    <!-- UPLOAD WINDOW -->
    <div class="card">
      <h2>📤 Upload Files</h2>

      <form action="/upload" method="POST" enctype="multipart/form-data">

        <label>Select Category</label>
        <select name="category" required>
          <option value="notes">📘 NOTES</option>
          <option value="cat">📝 CAT</option>
          <option value="exams">📄 EXAMS</option>
        </select>

        <input type="file" name="files" multiple required>

        <button type="submit">Upload Files</button>
      </form>
    </div>

    <!-- FILES WINDOW -->
    <div class="card">
      <h2>📁 Uploaded Materials</h2>

      <ul>
        {{filesList}}
      </ul>
    </div>

  </div>
</div>

</body>
</html>
