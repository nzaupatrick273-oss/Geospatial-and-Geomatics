<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f6f8; }
    header { background-color: #007BFF; color: white; padding: 20px; text-align: center; }
    nav { width: 200px; background-color: #fff; position: fixed; top: 80px; bottom: 0; left: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.1); padding-top: 20px; }
    nav a { display: block; padding: 12px 20px; color: #333; text-decoration: none; margin-bottom: 5px; }
    nav a:hover { background-color: #007BFF; color: white; }
    main { margin-left: 220px; padding: 20px; }
    .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .logout-btn { display: inline-block; padding: 10px 20px; background-color: #dc3545; color: white; border: none; border-radius: 5px; text-decoration: none; cursor: pointer; }
    .logout-btn:hover { background-color: #c82333; }
    input[type="file"] { margin-bottom: 10px; }
    button.upload-btn { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    button.upload-btn:hover { background-color: #218838; }
    ul { list-style: none; padding-left: 0; }
    li { margin-bottom: 8px; }
    li a { text-decoration: none; color: #007BFF; }
    li a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Admin Dashboard</h1>
  </header>

  <nav>
    <a href="#">Dashboard Home</a>
    <a href="#">Users</a>
    <a href="#">Settings</a>
    <a href="#">Reports</a>
    <a href="/logout" class="logout-btn">Logout</a>
  </nav>

  <main>
    <!-- Upload Form -->
    <div class="card">
      <h2>Upload Document</h2>
      <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required />
        <br />
        <button type="submit" class="upload-btn">Upload</button>
      </form>
    </div>

    <!-- Uploaded Files List -->
    <div class="card">
      <h2>Uploaded Files</h2>
      <ul>
        {{filesList}}
      </ul>
    </div>
  </main>
</body>
</html>
