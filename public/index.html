<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geomatic Geospatial Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f5;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #007BFF;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 40px;
      gap: 20px;
    }
    .card {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .card a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background-color: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .card a:hover {
      background-color: #0056b3;
    }
    .card p {
      margin-top: 10px;
      color: #333;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Geomatic Geospatial Dashboard</h1>
  </header>
  <main>
    <!-- Admin Login Card -->
    <div class="card">
      <h2>Admin</h2>
      <p>Login to the admin dashboard to upload and manage files</p>
      <a href="/admin-login">Admin Login</a>
    </div>

    <!-- Available Files Card -->
    <div class="card">
      <h2>Files</h2>
      <p>View all files available to the public</p>
      <a href="/files">Available Files</a>
    </div>

    <!-- Contact / Donate Card -->
    <div class="card">
      <h2>Contact / Donate</h2>
      <p>Write, donate or contact: <strong>0714298946</strong></p>
    </div>
  </main>
</body>
</html>
