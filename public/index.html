<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geomatic & Geospatial Reading Materials</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modal styling */
        .modal {
            display: none; /* hidden by default */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
            text-align: left;
        }
        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        ul { list-style-type: none; padding: 0; }
        li { margin: 5px 0; }
        a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Geomatic & Geospatial Reading Materials</h1>

    <button id="view-files-btn">View Available Files</button>

    <h2>Donate</h2>
    <p>PAYBILL: 400200</p>
    <p>Account No: 24571429894601</p>

    <a href="/admin-login">Admin Login</a>

    <!-- Modal -->
    <div id="filesModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Available Files</h2>
            <ul id="file-list">
                <!-- Files will be loaded here -->
            </ul>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
